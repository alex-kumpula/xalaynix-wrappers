[git_status]
style = "bg:#DA627D fg:#000000"
format = "[[($all_status$ahead_behind )]($style)]($style)"

[nix_shell]
symbol = "ÔĆď "
style = "bg:#FCA311 fg:#000000"
format = "[ $symbol$state ]($style)"

[character]
